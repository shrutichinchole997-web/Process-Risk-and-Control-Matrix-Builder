<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Notification</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        .header { background-color: #1B4F8A; color: white; padding: 10px; text-align: center; border-radius: 5px 5px 0 0; }
        .content { padding: 20px; }
        .footer { font-size: 0.8em; color: #777; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 th:text="${subject}">Subject</h2>
        </div>
        <div class="content">
            <p>Hello,</p>
            <p th:text="${message}">Message content goes here.</p>
            <p>Regards,<br/>Tool-68 Team</p>
        </div>
        <div class="footer">
            &copy; 2026 Tool-68. All rights reserved.
        </div>
    </div>
</body>
</html>
