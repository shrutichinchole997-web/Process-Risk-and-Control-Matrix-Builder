spring:
  datasource:
    url: jdbc:h2:mem:tool68_local;DB_CLOSE_DELAY=-1
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6379 # This will still fail if redis isn't there, so I should disable redis caching for local
  cache:
    type: simple # Use simple in-memory cache instead of Redis
  mail:
    host: localhost
    port: 1025

jwt:
  secret: verysecretkeythatisatleast32byteslongforsha256!
  expiration: 86400000
